<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RevoVoice</title>
<script src="https://unpkg.com/wavesurfer.js@7"></script>
<script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/spectrogram.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e5e5e5;min-height:100vh}

/* Layout */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:224px;min-width:224px;background:#111;border-right:1px solid #1e1e1e;display:flex;flex-direction:column}
.main{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:24px 32px}

/* Sidebar */
.sidebar-header{padding:20px;border-bottom:1px solid #1e1e1e}
.sidebar-header h2{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:1px}
.sidebar-body{flex:1;overflow-y:auto;padding:12px}

.speaker-card{background:#181818;border:1px solid #252525;border-radius:10px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.speaker-card:hover{border-color:#3b82f6;background:#1a1a2a}
.speaker-card.selected{border-color:#3b82f6;background:#1a2040}
.speaker-card .name{font-size:14px;font-weight:500;color:#ddd}
.speaker-card .play-btn{width:32px;height:32px;border-radius:50%;background:#252525;border:1px solid #333;color:#aaa;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:12px;flex-shrink:0}
.speaker-card .play-btn:hover{background:#3b82f6;border-color:#3b82f6;color:#fff}
.spk-group-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin-top:8px;cursor:pointer;user-select:none;border-radius:6px;background:#1a1a1a;border:1px solid #222}
.spk-group-header:first-child{margin-top:0}
.spk-group-header:hover{background:#1e1e2e}
.spk-group-header .label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px}
.spk-group-header .count{font-size:11px;color:#555}
.spk-group-header .arrow{color:#555;font-size:10px;transition:transform .15s}
.spk-group-header.collapsed .arrow{transform:rotate(-90deg)}
.spk-group-body{overflow:hidden;transition:max-height .2s}
.spk-group-body.collapsed{max-height:0 !important}

.sidebar-footer{padding:16px;border-top:1px solid #1e1e1e}
.upload-btn{width:100%;background:#181818;border:1px dashed #333;border-radius:10px;color:#888;padding:12px;font-size:13px;cursor:pointer;transition:all .15s;text-align:center}
.upload-btn:hover{border-color:#3b82f6;color:#bbb}

/* Main content */
.main h1{font-size:22px;font-weight:600;margin-bottom:4px}
.main .subtitle{color:#666;font-size:13px;margin-bottom:24px}

/* Prompt presets */
.section{margin-bottom:20px}
.section-label{font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.preset-list{display:flex;flex-direction:column;gap:12px;max-height:260px;overflow-y:auto;padding-right:4px}
.preset-group{}
.preset-cat{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.preset-chips{display:flex;flex-wrap:wrap;gap:6px}
.preset-chip{background:#141414;border:1px solid #222;border-radius:20px;padding:6px 14px;cursor:pointer;transition:all .15s;font-size:12px;color:#999;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
.preset-chip:hover{border-color:#3b82f6;color:#ddd;background:#1a1a2a}
.preset-chip.selected{border-color:#3b82f6;background:#1a2040;color:#fff}

/* Text input */
.text-input{width:100%;background:#141414;border:1px solid #222;border-radius:10px;color:#e5e5e5;padding:14px 16px;font-size:14px;font-family:inherit;resize:vertical;min-height:100px;max-height:300px}
.text-input:focus{outline:none;border-color:#3b82f6}
.text-input::placeholder{color:#555}

/* Generation params */
.params-grid{display:flex;gap:16px;flex-wrap:wrap}
.param-group{flex:1;min-width:140px}
.param-group label{display:block;font-size:11px;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.param-group input,.param-group select{width:100%;background:#141414;border:1px solid #222;border-radius:8px;color:#e5e5e5;padding:10px 12px;font-size:13px;font-family:inherit}
.param-group input:focus,.param-group select:focus{outline:none;border-color:#3b82f6}
.param-group input[type=range]{-webkit-appearance:none;appearance:none;border:none;padding:0;height:6px;border-radius:3px;background:#252525}
.param-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#3b82f6;cursor:pointer}
.param-group select option{background:#141414;color:#e5e5e5}

/* Generate button */
.generate-btn{width:100%;background:#3b82f6;border:none;border-radius:10px;color:#fff;padding:14px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:4px}
.generate-btn:hover{background:#2563eb}
.generate-btn:disabled{background:#1e1e1e;color:#444;cursor:not-allowed}
.stream-btn{background:#8b5cf6}
.stream-btn:hover{background:#7c3aed}
.stream-btn:disabled{background:#1e1e1e;color:#444;cursor:not-allowed}

/* Error */
.error{background:#2a1010;border:1px solid #5c1a1a;border-radius:10px;padding:14px;color:#f87171;font-size:13px;margin-top:12px}

/* Spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Upload modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:#181818;border:1px solid #252525;border-radius:14px;padding:24px;width:400px;max-width:90vw}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.modal label{display:block;font-size:12px;color:#888;margin-bottom:6px}
.modal input[type=text],.modal input[type=file]{width:100%;background:#141414;border:1px solid #222;border-radius:8px;color:#e5e5e5;padding:10px 12px;font-size:13px;margin-bottom:12px}
.modal input[type=file]{padding:8px;cursor:pointer}
.modal .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.modal .btn-cancel{background:#252525;border:none;border-radius:8px;color:#aaa;padding:10px 20px;cursor:pointer;font-size:13px}
.modal .btn-submit{background:#3b82f6;border:none;border-radius:8px;color:#fff;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600}
.modal .btn-submit:hover{background:#2563eb}
.modal .btn-cancel:hover{background:#333}

/* Responsive */
@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;min-width:unset;max-height:200px;border-right:none;border-bottom:1px solid #1e1e1e}
  .sidebar-body{display:flex;overflow-x:auto;gap:8px;padding:8px}
  .speaker-card{min-width:140px;margin-bottom:0}
}
</style>
</head>
<body>
<div class="layout">
  <!-- Sidebar: Speakers -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Speakers <span id="voices-rev" style="color:#444;font-size:10px;font-weight:normal"></span></h2>
      <button onclick="refreshVoices(this)" title="Refresh speakers from HuggingFace" style="background:none;border:1px solid #333;color:#888;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:14px">&#8635;</button>
    </div>
    <div class="sidebar-body" id="speaker-list">
      <!-- populated by JS -->
    </div>
    <div id="ref-text-display" style="padding:8px 12px;font-size:12px;color:#888;border-top:1px solid #333;max-height:60px;overflow-y:auto;display:none"></div>
    <div class="sidebar-footer">
      <div class="upload-btn" onclick="showDesignModal()" style="margin-bottom:8px">&#10022; Design Voice</div>
      <div class="upload-btn" onclick="showUploadModal()">+ Upload Speaker</div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <h1>RevoVoice</h1>
    <p class="subtitle">Text-to-speech generation <span id="model-rev" style="color:#444;font-size:11px;margin-left:6px"></span></p>

    <!-- Prompt Presets -->
    <div class="section">
      <div class="section-label">Prompt Preset</div>
      <div class="preset-list" id="preset-list">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- Text Input -->
    <div class="section">
      <div class="section-label">Text to Synthesize</div>
      <textarea class="text-input" id="text-input" placeholder="Enter text or select a preset above..." oninput="debounceEstimate()"></textarea>
    </div>

    <!-- Generation Params -->
    <div class="section">
      <div class="section-label">Generation Params</div>
      <div class="params-grid">
        <div class="param-group">
          <label>Temperature</label>
          <input type="number" id="param-temp" value="0.3" min="0" max="2" step="0.1">
        </div>
        <div class="param-group">
          <label>Target LUFS</label>
          <input type="number" id="param-lufs" value="-23" min="-60" max="0" step="1">
        </div>
        <div class="param-group">
          <label>Speed Mode</label>
          <select id="param-speed-mode">
            <option value="turbo">Turbo (4 steps)</option>
            <option value="fast" selected>Fast (10 steps)</option>
            <option value="normal">Normal (16 steps)</option>
            <option value="quality">Quality (32 steps)</option>
          </select>
        </div>
        <div class="param-group">
          <label>Duration Override</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="range" id="param-duration" min="0.5" max="20" step="0.1" value="0" style="flex:1;display:none">
            <span id="param-duration-label" style="font-size:12px;color:#666;min-width:60px">Auto</span>
          </div>
          <div id="duration-estimate" style="font-size:11px;color:#555;margin-top:4px"></div>
        </div>
      </div>
    </div>

    <!-- Generate -->
    <div style="display:flex;gap:10px">
      <button class="generate-btn" id="generate-btn" onclick="generate()" style="flex:3">Generate</button>
      <button class="generate-btn stream-btn" id="stream-btn" onclick="streamGenerate()" style="flex:1">Stream</button>
    </div>
    <div id="error-box"></div>
    <div id="normalized-text" style="display:none;margin-top:8px;padding:8px 10px;background:#1a1a1a;border-radius:8px;font-size:13px;color:#8b8b8b;border:1px solid #2a2a2a">
      <span style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.5px">Normalized</span>
      <div id="normalized-text-content" style="margin-top:4px"></div>
    </div>

    <!-- Stream Debug Panel -->
    <div id="stream-debug" style="display:none;margin-top:16px">
      <div class="section-label" style="display:flex;align-items:center;justify-content:space-between">
        <span>Stream Debug</span>
        <span id="stream-stats" style="font-weight:400;color:#5588ff"></span>
      </div>
      <div id="stream-log" style="background:#0d0d0d;border:1px solid #1e1e1e;border-radius:8px;padding:10px 12px;font-family:monospace;font-size:11px;max-height:260px;overflow-y:auto;line-height:1.6"></div>
    </div>

    <!-- Audio Visualization -->
    <div id="audio-viz" style="display:none;margin-top:16px">
      <div class="section-label">Audio Visualization</div>
      <div id="waveform"></div>
      <div id="spectrogram"></div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:10px;font-size:12px;color:#888">
        <button id="play-btn" onclick="togglePlay()" style="width:36px;height:36px;border-radius:50%;background:#3b82f6;border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0">&#9654;</button>
        <span id="audio-meta"></span>
        <div id="audio-meta-note" style="display:none;font-size:11px;color:#555;margin-top:2px"></div>
        <span style="margin-left:auto">
          <a id="download-link" style="color:#3b82f6;text-decoration:none" download="speech.wav">Download</a>
          <a id="save-speaker-link" style="display:none;cursor:pointer;color:#3b82f6;text-decoration:none;margin-left:10px" onclick="saveAsSpeaker()">Save as Speaker</a>
        </span>
      </div>
    </div>
  </div>
</div>

<!-- Voice Design Modal -->
<div class="modal-overlay" id="design-modal">
  <div class="modal" style="width:460px">
    <h3>Voice Design (Instruct)</h3>
    <label>Gender</label>
    <select id="design-gender">
      <option value="">Any</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>
    <label>Age</label>
    <select id="design-age">
      <option value="">Any</option>
      <option value="Child">Child</option>
      <option value="Teenager">Teenager</option>
      <option value="Young Adult">Young Adult</option>
      <option value="Middle-aged">Middle-aged</option>
      <option value="Elderly">Elderly</option>
    </select>
    <label>Pitch</label>
    <select id="design-pitch">
      <option value="">Any</option>
      <option value="Very Low Pitch">Very Low</option>
      <option value="Low Pitch">Low</option>
      <option value="Moderate Pitch">Moderate</option>
      <option value="High Pitch">High</option>
      <option value="Very High Pitch">Very High</option>
    </select>
    <label>Accent</label>
    <select id="design-accent">
      <option value="">Any</option>
      <option value="American Accent">American</option>
      <option value="British Accent">British</option>
      <option value="Australian Accent">Australian</option>
      <option value="Chinese Accent">Chinese</option>
      <option value="Indian Accent">Indian</option>
      <option value="Japanese Accent">Japanese</option>
      <option value="Korean Accent">Korean</option>
      <option value="Malay Accent">Malay</option>
    </select>
    <label>Style</label>
    <select id="design-style">
      <option value="">Normal</option>
      <option value="Whisper">Whisper</option>
    </select>
    <label>Or type custom instruction</label>
    <input type="text" id="design-custom" placeholder="e.g. soft female news anchor voice">
    <div class="btn-row">
      <button class="btn-cancel" onclick="hideDesignModal()">Cancel</button>
      <button class="btn-submit" onclick="applyDesign()">Use This Voice</button>
    </div>
  </div>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="upload-modal">
  <div class="modal">
    <h3>Upload Speaker</h3>
    <label>Voice Name</label>
    <input type="text" id="upload-name" placeholder="e.g. my_voice">
    <label>Transcript</label>
    <input type="text" id="upload-ref-text" placeholder="What is being said in the audio...">
    <label>Audio File (WAV)</label>
    <input type="file" id="upload-file" accept="audio/*,.wav">
    <div class="btn-row">
      <button class="btn-cancel" onclick="hideUploadModal()">Cancel</button>
      <button class="btn-submit" onclick="uploadSpeaker()">Upload</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let speakers = [];
let quotes = [];
let categories = {};
let selectedSpeaker = null;
let activeInstruct = null;
let lastGeneratedBlob = null;
let lastWasDesign = false;
let wavesurfer = null;

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadSpeakers(), loadQuotes(), loadModelInfo()]);
}

async function loadModelInfo() {
  try {
    const res = await fetch('/health');
    const data = await res.json();
    const el = document.getElementById('model-rev');
    if (data.model_revision) {
      el.textContent = `${data.model_id} @ ${data.model_revision}`;
    }
    const vel = document.getElementById('voices-rev');
    if (data.voices_revision) {
      vel.textContent = `@ ${data.voices_revision}`;
    }
  } catch(e) {}
}

// ── Load speakers from GET /voices ──────────────────────────────────────────
async function loadSpeakers() {
  try {
    const res = await fetch('/voices');
    const data = await res.json();
    speakers = data.voices || [];
    renderSpeakers();
    if (speakers.length && !selectedSpeaker) {
      selectSpeaker(speakers[0].id);
    }
  } catch (e) {
    console.error('Failed to load speakers:', e);
  }
}

async function refreshVoices(btn) {
  btn.disabled = true;
  btn.innerHTML = '&#8987;';
  btn.style.color = '#f59e0b';
  try {
    const res = await fetch('/voices/refresh', { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    speakers = data.voices || [];
    renderSpeakers();
    if (data.updated) {
      btn.innerHTML = '&#10003;';
      btn.style.color = '#22c55e';
      if (speakers.length && !selectedSpeaker) selectSpeaker(speakers[0].id);
    } else {
      btn.innerHTML = '&#8212;';
      btn.style.color = '#888';
    }
  } catch (e) {
    console.error('Failed to refresh voices:', e);
    btn.innerHTML = '&#10007;';
    btn.style.color = '#ef4444';
  }
  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = '&#8635;';
    btn.style.color = '#888';
  }, 2000);
}

const SOURCE_LABELS = { internal: 'Internal', seiyuu: 'Seiyuu', 'common-voice': 'Common Voice', nexdata: 'Nexdata' };
const collapsedGroups = new Set();

function renderSpeakers() {
  const el = document.getElementById('speaker-list');
  el.innerHTML = '';

  if (activeInstruct) {
    const card = document.createElement('div');
    card.className = 'speaker-card selected';
    card.innerHTML = `<span class="name" style="color:#3b82f6;font-style:italic">Design: ${esc(activeInstruct)}</span>`;
    card.onclick = () => { activeInstruct = null; renderSpeakers(); };
    el.appendChild(card);
  }

  // Group by source
  const groups = {};
  speakers.forEach(s => {
    const src = s.source || 'other';
    if (!groups[src]) groups[src] = [];
    groups[src].push(s);
  });

  const sourceOrder = ['internal', 'seiyuu', 'common-voice', 'nexdata', 'other'];
  const sortedSources = Object.keys(groups).sort((a, b) => {
    const ia = sourceOrder.indexOf(a), ib = sourceOrder.indexOf(b);
    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return 1;
    return a.localeCompare(b);
  });

  sortedSources.forEach(src => {
    const items = groups[src];
    const label = SOURCE_LABELS[src] || src;
    const collapsed = collapsedGroups.has(src);

    const header = document.createElement('div');
    header.className = 'spk-group-header' + (collapsed ? ' collapsed' : '');
    header.innerHTML = `<span class="label">${label}</span><span class="count">${items.length}</span><span class="arrow">&#9660;</span>`;
    header.onclick = () => {
      if (collapsedGroups.has(src)) collapsedGroups.delete(src);
      else collapsedGroups.add(src);
      renderSpeakers();
    };
    el.appendChild(header);

    const body = document.createElement('div');
    body.className = 'spk-group-body' + (collapsed ? ' collapsed' : '');
    items.forEach(s => {
      const card = document.createElement('div');
      card.className = 'speaker-card' + (selectedSpeaker === s.id && !activeInstruct ? ' selected' : '');
      card.innerHTML = `
        <span class="name">${esc(s.name)}</span>
        <div class="play-btn" onclick="event.stopPropagation();previewVoice('${s.id}')" title="Preview">&#9654;</div>
      `;
      card.onclick = () => selectSpeaker(s.id);
      body.appendChild(card);
    });
    el.appendChild(body);
  });
}

function selectSpeaker(id) {
  selectedSpeaker = id;
  activeInstruct = null;
  renderSpeakers();
  // Show transcript
  const s = speakers.find(v => v.id === id);
  const el = document.getElementById('ref-text-display');
  if (el) {
    if (s && s.transcript) {
      el.textContent = s.transcript;
      el.style.display = 'block';
    } else {
      el.textContent = '';
      el.style.display = 'none';
    }
  }
  estimateDuration();
}

// ── Load quotes from GET /api/quotes ────────────────────────────────────────
async function loadQuotes() {
  try {
    const res = await fetch('/api/quotes');
    const data = await res.json();
    quotes = data.quotes || [];
    categories = data.categories || {};
    renderPresets();
  } catch (e) {
    console.error('Failed to load quotes:', e);
  }
}

function renderPresets() {
  const el = document.getElementById('preset-list');
  el.innerHTML = '';
  const catOrder = ['Tone', 'Digits', 'Entity', 'Code-mixing', 'Quoted words', 'Long text', 'General'];
  catOrder.forEach(cat => {
    const items = categories[cat];
    if (!items || !items.length) return;
    const group = document.createElement('div');
    group.className = 'preset-group';

    const label = document.createElement('div');
    label.className = 'preset-cat';
    label.textContent = cat;

    const chips = document.createElement('div');
    chips.className = 'preset-chips';
    items.forEach(q => {
      const chip = document.createElement('span');
      chip.className = 'preset-chip';
      chip.textContent = q;
      chip.title = q;
      chip.onclick = () => {
        document.getElementById('text-input').value = q;
        el.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
      };
      chips.appendChild(chip);
    });

    group.appendChild(label);
    group.appendChild(chips);
    el.appendChild(group);
  });
}

// ── Preview voice (small generate call) ─────────────────────────────────────
async function previewVoice(id) {
  try {
    const audio = new Audio(`/voices/${encodeURIComponent(id)}/audio`);
    audio.play();
  } catch (e) {
    console.error('Preview failed:', e);
  }
}

// ── Generate via POST /generate ─────────────────────────────────────────────
async function generate() {
  const btn = document.getElementById('generate-btn');
  const errorBox = document.getElementById('error-box');

  errorBox.innerHTML = '';
  document.getElementById('normalized-text').style.display = 'none';
  document.getElementById('stream-debug').style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating...';

  try {
    const text = document.getElementById('text-input').value.trim();
    if (!text) throw new Error('Please enter text or select a preset');
    if (!selectedSpeaker && !activeInstruct) throw new Error('Please select a speaker or design a voice');

    // Normalize text for display (runs in parallel with generation)
    const normEl = document.getElementById('normalized-text');
    const normContent = document.getElementById('normalized-text-content');
    const normPromise = fetch('/api/normalize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, language: _detectLang() }),
    }).then(r => r.json()).then(data => {
      if (data.normalized && data.normalized !== text) {
        normContent.textContent = data.normalized;
        normEl.style.display = 'block';
      } else {
        normEl.style.display = 'none';
      }
    }).catch(() => { normEl.style.display = 'none'; });

    const body = {
      text,
      voice_ref_path: selectedSpeaker || undefined,
      instruct: activeInstruct || undefined,
      language: _detectLang(),
      temperature: _num('param-temp', 0.3),
      target_lufs: _num('param-lufs', -23),
      duration: _getDuration(),
      ..._speedModeParams(),
    };

    const t0 = performance.now();
    const response = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!response.ok) {
      let detail = `HTTP ${response.status}`;
      try { const err = await response.json(); detail = err.error?.message || err.detail || detail; } catch {}
      throw new Error(detail);
    }

    const blob = await response.blob();
    const latencyMs = performance.now() - t0;
    const serverLatency = parseFloat(response.headers.get('X-Latency-S')) || null;
    const serverRTF = parseFloat(response.headers.get('X-RTF')) || null;
    lastGeneratedBlob = blob;
    lastWasDesign = !!activeInstruct;
    const url = URL.createObjectURL(blob);
    document.getElementById('download-link').href = url;

    document.getElementById('audio-viz').style.display = 'block';
    document.getElementById('save-speaker-link').style.display = lastWasDesign ? 'inline' : 'none';
    _initWavesurfer(blob, latencyMs, serverLatency, serverRTF);
  } catch (e) {
    errorBox.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Generate';
  }
}

// ── Stream via WebSocket ─────────────────────────────────────────────────────
function _buildWavHeader(dataLength, sampleRate, bitsPerSample, channels) {
  const buffer = new ArrayBuffer(44);
  const view = new DataView(buffer);
  const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + dataLength, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, channels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * channels * (bitsPerSample / 8), true);
  view.setUint16(32, channels * (bitsPerSample / 8), true);
  view.setUint16(34, bitsPerSample, true);
  writeStr(36, 'data');
  view.setUint32(40, dataLength, true);
  return new Uint8Array(buffer);
}

function _hexDump(uint8arr, maxBytes) {
  const bytes = [];
  const n = Math.min(uint8arr.length, maxBytes || 16);
  for (let i = 0; i < n; i++) bytes.push(uint8arr[i].toString(16).padStart(2, '0'));
  return bytes.join(' ') + (uint8arr.length > n ? ' ...' : '');
}

function _streamLog(el, type, msg, color) {
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false, fractionalSecondDigits: 3 });
  const c = color || '#aaa';
  el.innerHTML += `<div style="color:${c}"><span style="color:#555">${ts}</span> <span style="color:#666">[${type}]</span> ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function streamGenerate() {
  const btn = document.getElementById('stream-btn');
  const errorBox = document.getElementById('error-box');
  const debugPanel = document.getElementById('stream-debug');
  const log = document.getElementById('stream-log');
  const stats = document.getElementById('stream-stats');

  errorBox.innerHTML = '';
  log.innerHTML = '';
  stats.textContent = '';
  debugPanel.style.display = 'block';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Streaming...';

  try {
    const text = document.getElementById('text-input').value.trim();
    if (!text) throw new Error('Please enter text or select a preset');
    if (!selectedSpeaker && !activeInstruct) throw new Error('Please select a speaker or design a voice');

    const wsUrl = location.protocol.replace('http', 'ws') + '//' + location.host + '/tts/websocket';
    _streamLog(log, 'WS', 'Connecting to ' + wsUrl, '#888');

    const ws = new WebSocket(wsUrl);
    const pcmChunks = [];
    const ctxId = 'stream-' + Date.now();
    let chunkIdx = 0;
    let totalBytes = 0;
    const startTime = performance.now();

    await new Promise((resolve, reject) => {
      ws.onopen = () => {
        const payload = {
          transcript: text,
          voice: { mode: 'id', id: selectedSpeaker || 'anwar' },
          output_format: { container: 'raw', encoding: 'pcm_s16le', sample_rate: 24000 },
          context_id: ctxId,
          continue: false,
        };
        _streamLog(log, 'SEND', JSON.stringify(payload).substring(0, 120) + '...', '#5588ff');
        ws.send(JSON.stringify(payload));
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'audio_chunk' && msg.data) {
          const raw = atob(msg.data);
          const buf = new Uint8Array(raw.length);
          for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
          pcmChunks.push(buf);
          chunkIdx++;
          totalBytes += buf.length;
          const hex = _hexDump(buf, 16);
          _streamLog(log, `CHUNK #${chunkIdx}`, `${buf.length} bytes | first: ${hex}`, '#4ade80');
          const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
          stats.textContent = `${chunkIdx} chunks · ${(totalBytes/1024).toFixed(1)} KB · ${elapsed}s`;
        } else if (msg.type === 'done') {
          const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
          _streamLog(log, 'DONE', `${chunkIdx} chunks, ${totalBytes} bytes in ${elapsed}s`, '#fbbf24');
          ws.close();
          resolve();
        } else if (msg.type === 'error') {
          _streamLog(log, 'ERROR', esc(msg.error), '#f87171');
          ws.close();
          reject(new Error(msg.error || 'Stream failed'));
        }
      };

      ws.onerror = () => { _streamLog(log, 'ERROR', 'Connection failed', '#f87171'); reject(new Error('WebSocket connection failed')); };
      ws.onclose = () => resolve();
    });

    if (pcmChunks.length === 0) throw new Error('No audio received');

    // Assemble PCM + WAV header
    const totalLen = pcmChunks.reduce((s, c) => s + c.length, 0);
    const wavHeader = _buildWavHeader(totalLen, 24000, 16, 1);
    const wav = new Uint8Array(44 + totalLen);
    wav.set(wavHeader, 0);
    let offset = 44;
    for (const chunk of pcmChunks) { wav.set(chunk, offset); offset += chunk.length; }

    const blob = new Blob([wav], { type: 'audio/wav' });
    lastGeneratedBlob = blob;
    lastWasDesign = !!activeInstruct;
    const url = URL.createObjectURL(blob);
    document.getElementById('download-link').href = url;

    document.getElementById('audio-viz').style.display = 'block';
    document.getElementById('save-speaker-link').style.display = lastWasDesign ? 'inline' : 'none';
    _initWavesurfer(blob);
  } catch (e) {
    errorBox.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Stream';
  }
}

// ── Upload modal ────────────────────────────────────────────────────────────
function showUploadModal() {
  document.getElementById('upload-modal').classList.add('visible');
}
function hideUploadModal() {
  document.getElementById('upload-modal').classList.remove('visible');
}

async function uploadSpeaker() {
  const name = document.getElementById('upload-name').value.trim();
  const refText = document.getElementById('upload-ref-text').value.trim();
  const file = document.getElementById('upload-file').files[0];
  if (!name) return alert('Please enter a voice name');
  if (!refText) return alert('Please enter the transcript');
  if (!file) return alert('Please select a WAV file');

  const formData = new FormData();
  formData.append('voice_name', name);
  formData.append('ref_text', refText);
  formData.append('audio_file', file);

  try {
    const res = await fetch('/voices', { method: 'POST', body: formData });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || err.detail || `HTTP ${res.status}`);
    }
    hideUploadModal();
    document.getElementById('upload-name').value = '';
    document.getElementById('upload-ref-text').value = '';
    document.getElementById('upload-file').value = '';
    await loadSpeakers();
    selectSpeaker(name);
  } catch (e) {
    alert('Upload failed: ' + e.message);
  }
}

// ── Voice Design modal ──────────────────────────────────────────────────────
function showDesignModal() {
  document.getElementById('design-modal').classList.add('visible');
}
function hideDesignModal() {
  document.getElementById('design-modal').classList.remove('visible');
}
function _buildInstruct() {
  const custom = document.getElementById('design-custom').value.trim();
  if (custom) return custom;
  const parts = [
    document.getElementById('design-gender').value,
    document.getElementById('design-age').value,
    document.getElementById('design-pitch').value,
    document.getElementById('design-accent').value,
    document.getElementById('design-style').value,
  ].filter(Boolean);
  return parts.join(', ') || null;
}
function applyDesign() {
  const val = _buildInstruct();
  if (!val) return alert('Please select at least one attribute or type a custom instruction');
  activeInstruct = val;
  selectedSpeaker = null;
  renderSpeakers();
  hideDesignModal();
}

// ── Player ──────────────────────────────────────────────────────────────────
function togglePlay() {
  if (wavesurfer) wavesurfer.playPause();
}
function hidePlayer() {
  document.getElementById('audio-viz').style.display = 'none';
  if (wavesurfer) { wavesurfer.destroy(); wavesurfer = null; }
}

async function saveAsSpeaker() {
  const name = prompt('Save as speaker name:');
  if (!name || !name.trim()) return;
  const text = document.getElementById('text-input').value.trim();
  const formData = new FormData();
  formData.append('voice_name', name.trim());
  formData.append('ref_text', text || 'Voice design sample');
  formData.append('audio_file', lastGeneratedBlob, 'voice.wav');
  try {
    const res = await fetch('/voices', { method: 'POST', body: formData });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || err.detail || 'Upload failed');
    }
    await loadSpeakers();
    selectSpeaker(name.trim());
    activeInstruct = null;
    renderSpeakers();
    alert('Speaker saved: ' + name.trim());
  } catch (e) {
    alert('Save failed: ' + e.message);
  }
}

// ── Utils ───────────────────────────────────────────────────────────────────
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function _num(id, fallback) {
  const v = parseFloat(document.getElementById(id).value);
  return isFinite(v) ? v : fallback;
}
function _speedModeParams() {
  const mode = document.getElementById('param-speed-mode').value;
  if (mode === 'turbo') return { num_step: 4 };
  if (mode === 'fast') return { num_step: 10 };
  if (mode === 'normal') return { num_step: 16 };
  return { num_step: 32 };
}
function _detectLang() {
  const s = speakers.find(v => v.id === selectedSpeaker);
  const ld = s && s.language_detected;
  if (ld === 'ms') return 'ms';
  if (ld === 'ja') return 'en';
  return 'en';
}

let estimatedDurationS = 0;

async function estimateDuration() {
  const text = document.getElementById('text-input').value.trim();
  const estEl = document.getElementById('duration-estimate');
  const slider = document.getElementById('param-duration');
  const label = document.getElementById('param-duration-label');

  if (!text || !selectedSpeaker) {
    estEl.textContent = '';
    slider.style.display = 'none';
    label.textContent = 'Auto';
    estimatedDurationS = 0;
    return;
  }

  try {
    const res = await fetch('/api/estimate-duration', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voice_id: selectedSpeaker }),
    });
    const data = await res.json();
    estimatedDurationS = data.estimated_duration_s;

    if (estimatedDurationS > 0) {
      const frames = data.estimated_frames;
      const refDur = data.ref_duration_s;
      const f = data.formula;
      let html = `~${estimatedDurationS.toFixed(1)}s (${frames} frames) · ref: ${refDur.toFixed(1)}s`;
      if (f) {
        html += `<br><span style="color:#444;font-size:10px">frames: ${f.est_frames} → ${f.est_duration}</span>`;
      }
      estEl.innerHTML = html;
      const prevVal = parseFloat(slider.value);
      const wasCustom = prevVal > 0 && slider.style.display !== 'none';
      slider.min = Math.max(0.5, estimatedDurationS * 0.5);
      slider.max = Math.min(20, estimatedDurationS * 2);
      slider.step = 0.1;
      if (!wasCustom) {
        slider.value = 0;
        label.textContent = 'Auto';
      } else if (prevVal < parseFloat(slider.min) || prevVal > parseFloat(slider.max)) {
        slider.value = Math.max(parseFloat(slider.min), Math.min(parseFloat(slider.max), prevVal));
        label.textContent = parseFloat(slider.value).toFixed(1) + 's';
      }
      slider.style.display = 'block';
    } else {
      estEl.textContent = '';
      slider.style.display = 'none';
    }
  } catch (e) {
    estEl.textContent = '';
  }
}

function _getDuration() {
  const slider = document.getElementById('param-duration');
  const label = document.getElementById('param-duration-label');
  const val = parseFloat(slider.value);
  if (val > 0 && slider.style.display !== 'none') return val;
  return undefined;
}

let _estTimer = null;
function debounceEstimate() {
  clearTimeout(_estTimer);
  _estTimer = setTimeout(estimateDuration, 400);
}

// Duration slider handler
document.getElementById('param-duration').addEventListener('input', function() {
  const label = document.getElementById('param-duration-label');
  const val = parseFloat(this.value);
  if (val > 0) {
    label.textContent = val.toFixed(1) + 's';
    label.style.color = '#3b82f6';
  } else {
    label.textContent = 'Auto';
    label.style.color = '#666';
  }
});

// ── Spectrogram ────────────────────────────────────────────────────────────
function _initWavesurfer(blob, latencyMs, serverLatency, serverRTF) {
  if (wavesurfer) wavesurfer.destroy();
  const url = URL.createObjectURL(blob);
  wavesurfer = WaveSurfer.create({
    container: '#waveform',
    waveColor: '#3b82f6',
    progressColor: '#1d4ed8',
    height: 80,
    barWidth: 2,
    barGap: 1,
    barRadius: 2,
    url: url,
  });
  wavesurfer.registerPlugin(
    WaveSurfer.Spectrogram.create({
      container: '#spectrogram',
      height: 160,
      splitChannels: false,
      labels: true,
    })
  );
  wavesurfer.on('ready', () => {
    const dur = wavesurfer.getDuration();
    const sizeKB = (blob.size / 1024).toFixed(0);
    let meta = `${dur.toFixed(1)}s · ${sizeKB} KB`;
    if (serverLatency != null) {
      meta += ` · model ${(serverLatency * 1000).toFixed(0)}ms`;
      if (serverRTF != null) meta += ` (${serverRTF.toFixed(2)}x RTF)`;
    }
    if (latencyMs != null) {
      meta += ` · total ${(latencyMs).toFixed(0)}ms`;
    }
    document.getElementById('audio-meta').textContent = meta;
    const metaNote = document.getElementById('audio-meta-note');
    if (metaNote) {
      let note = '';
      if (serverLatency != null) note += 'model = inference only. ';
      if (latencyMs != null) note += 'total = model + norm + encode + HTTP.';
      metaNote.textContent = note;
      metaNote.style.display = note ? 'block' : 'none';
    }
    wavesurfer.play();
  });
  wavesurfer.on('play', () => {
    document.getElementById('play-btn').innerHTML = '&#10074;&#10074;';
  });
  wavesurfer.on('pause', () => {
    document.getElementById('play-btn').innerHTML = '&#9654;';
  });
}

// ── Start ───────────────────────────────────────────────────────────────────
init();
</script>
